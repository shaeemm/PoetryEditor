<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centered Canvas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="sidebar" class="sidebar">
      <div class="raw">
        <div class="column">
          <button id="toggleButton"><p>&lt;</p></button>
        </div>

        <div class="spacedColumn">
          <div>
            <label for="slider">Добавить высоту: </label>
            <input type="range" id="slider" min="0" max="500" value="0" />
          </div>
        </div>
      </div>
    </div>
    <canvas id="myCanvas" width="1080" height="1920"></canvas>
    <script src="script.js"></script>
  </body>
</html>
